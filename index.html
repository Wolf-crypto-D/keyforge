<html lang="en">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyForge — Password Generator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head><!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VLB2B038XS"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-VLB2B038XS');
</script>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <main class="container">

    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
          <path d="M20 4C15.58 4 12 7.58 12 12c0 1.06.21 2.07.58 3L4 23.6V28h4.4l1.6-1.6V24h2.4l1.6-1.6V20h2l3.4-3.4c.62.24 1.3.4 2 .4 4.42 0 8-3.58 8-8s-3.58-8-8-8zm0 4a2 2 0 1 1 0 4 2 2 0 0 1 0-4z" fill="url(#keyGrad)"/>
          <defs>
            <linearGradient id="keyGrad" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#38bdf8"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">KeyForge</span>
      </div>
      <p class="tagline">Forge unbreakable passwords</p>
    </header>

    <div class="card">

      <div class="password-display-wrap">
        <div class="password-display" id="passwordDisplay">
          <span class="password-text" id="passwordText">Click Generate</span>
        </div>
        <button class="copy-btn" id="copyBtn" title="Copy password" aria-label="Copy password">
          <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <svg id="checkIcon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span id="copyLabel">Copy</span>
        </button>
      </div>

      <div class="strength-section">
        <div class="strength-header">
          <span class="strength-label">Strength</span>
          <span class="strength-text" id="strengthText">—</span>
        </div>
        <div class="strength-bar-track">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-ticks">
          <span>Weak</span>
          <span>Fair</span>
          <span>Good</span>
          <span>Strong</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="control-group">
        <div class="control-header">
          <label class="control-label" for="lengthSlider">Length</label>
          <div class="length-badge">
            <span id="lengthValue">16</span>
            <span class="length-unit">chars</span>
          </div>
        </div>
        <div class="slider-wrap">
          <input type="range" id="lengthSlider" min="8" max="32" value="16" class="slider" aria-label="Password length" />
        </div>
        <div class="slider-labels">
          <span>8</span>
          <span>32</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="control-group">
        <label class="control-label">Include</label>
        <div class="checkbox-grid">

          <label class="checkbox-item" for="uppercase">
            <input type="checkbox" id="uppercase" checked />
            <span class="checkbox-custom">
              <svg viewBox="0 0 14 14" fill="none"><polyline points="2 7 5.5 10.5 12 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <div class="checkbox-info">
              <span class="checkbox-name">Uppercase</span>
              <span class="checkbox-example">A–Z</span>
            </div>
          </label>

          <label class="checkbox-item" for="lowercase">
            <input type="checkbox" id="lowercase" checked />
            <span class="checkbox-custom">
              <svg viewBox="0 0 14 14" fill="none"><polyline points="2 7 5.5 10.5 12 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <div class="checkbox-info">
              <span class="checkbox-name">Lowercase</span>
              <span class="checkbox-example">a–z</span>
            </div>
          </label>

          <label class="checkbox-item" for="numbers">
            <input type="checkbox" id="numbers" checked />
            <span class="checkbox-custom">
              <svg viewBox="0 0 14 14" fill="none"><polyline points="2 7 5.5 10.5 12 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <div class="checkbox-info">
              <span class="checkbox-name">Numbers</span>
              <span class="checkbox-example">0–9</span>
            </div>
          </label>

          <label class="checkbox-item" for="symbols">
            <input type="checkbox" id="symbols" />
            <span class="checkbox-custom">
              <svg viewBox="0 0 14 14" fill="none"><polyline points="2 7 5.5 10.5 12 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <div class="checkbox-info">
              <span class="checkbox-name">Symbols</span>
              <span class="checkbox-example">!@#$</span>
            </div>
          </label>

        </div>
      </div>

      <button class="generate-btn" id="generateBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
        <span>Generate Password</span>
      </button>

    </div>

    <div class="entropy-info" id="entropyInfo">
      <svg viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 7v5M8 5.5V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span id="entropyText">Select options and generate a password</span>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
