<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../assets/css/cosmic.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker | KeyForge</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#1e293b;
padding:30px;
border-radius:15px;
width:100%;
max-width:450px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.home{
display:inline-block;
margin-bottom:20px;
padding:10px 18px;
background:#2563eb;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

h1{
margin-bottom:20px;
}

input[type=color]{
width:180px;
height:180px;
border:none;
border-radius:10px;
cursor:pointer;
background:none;
}

.preview{
margin:20px auto;
width:120px;
height:120px;
border-radius:12px;
border:3px solid #fff;
}

.code{
margin-top:15px;
background:#334155;
padding:12px;
border-radius:8px;
font-size:18px;
word-break:break-all;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:#fff;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}
</style>
</head>

<body>
<div class="bg-glow"></div>
<div id="stars"></div>
  
<div class="container">

<a class="home" href="../index.html">🏠 Home</a>

<h1>🎨 Color Picker</h1>

<input type="color" id="picker" value="#2563eb">

<div class="preview" id="preview"></div>

<div class="code" id="hex">#2563EB</div>

<button onclick="copyColor()">Copy HEX</button>

</div>

<script>

const picker=document.getElementById("picker");
const preview=document.getElementById("preview");
const hex=document.getElementById("hex");

function updateColor(){
preview.style.background=picker.value;
hex.innerText=picker.value.toUpperCase();
}

picker.addEventListener("input",updateColor);

function copyColor(){

navigator.clipboard.writeText(picker.value);

alert("HEX Code Copied!");

}

updateColor();

</script>

  <script src="../assets/js/cosmic.js"></script>
  
</body>
</html>
