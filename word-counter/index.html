<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../assets/css/cosmic.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter | KeyForge</title>
<meta name="description" content="Count words and characters instantly with the free Word Counter.">
<link rel="canonical" href="https://wolf-crypto-d.github.io/keyforge/word-counter/">
  
<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.container{
width:90%;
max-width:700px;
background:#1e293b;
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
text-align:center;
margin-top:0;
}

textarea{
width:100%;
height:220px;
padding:15px;
font-size:16px;
border:none;
border-radius:10px;
resize:none;
outline:none;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#334155;
padding:15px;
border-radius:10px;
text-align:center;
}

.number{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

.buttons{
margin-top:20px;
text-align:center;
}

button{
padding:12px 22px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#3b82f6;
color:white;
font-size:15px;
}

button:hover{
background:#2563eb;
}

</style>

</head>
<body>
  <div class="bg-glow"></div>
<div id="stars"></div>
<div style="padding:15px;">
  <a href="../index.html" style="
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    display:inline-block;
  ">🏠 Home</a>
</div>
<div class="container">

<h1>Word Counter</h1>

<textarea id="text" placeholder="Type or paste text here..." oninput="count()"></textarea>

<div class="stats">

<div class="card">
<div class="number" id="words">0</div>
Words
</div>

<div class="card">
<div class="number" id="characters">0</div>
Characters
</div>

<div class="card">
<div class="number" id="sentences">0</div>
Sentences
</div>

<div class="card">
<div class="number" id="paragraphs">0</div>
Paragraphs
</div>

<div class="card">
<div class="number" id="reading">0</div>
Read (min)
</div>

<div class="card">
<div class="number" id="letters">0</div>
Letters
</div>

</div>

<div class="buttons">

<button onclick="copyText()">Copy</button>

<button onclick="clearText()">Clear</button>

</div>

</div>

<script>

function count(){

let text=document.getElementById("text").value;

let words=text.trim().length?text.trim().split(/\s+/).length:0;

let chars=text.length;

let letters=text.replace(/[^a-zA-Z]/g,"").length;

let sentences=text.split(/[.!?]+/).filter(Boolean).length;

let paragraphs=text.split(/\n+/).filter(t=>t.trim()!="").length;

let reading=Math.ceil(words/200);

document.getElementById("words").innerHTML=words;
document.getElementById("characters").innerHTML=chars;
document.getElementById("letters").innerHTML=letters;
document.getElementById("sentences").innerHTML=sentences;
document.getElementById("paragraphs").innerHTML=paragraphs;
document.getElementById("reading").innerHTML=reading;

}

function copyText(){

let box=document.getElementById("text");

box.select();

document.execCommand("copy");

alert("Copied!");

}

function clearText(){

document.getElementById("text").value="";

count();

}

count();

</script>
  <script src="../assets/js/cosmic.js"></script>

</body>
</html>
